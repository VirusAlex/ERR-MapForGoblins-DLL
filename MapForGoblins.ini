[Goblin]

; Delay in seconds before loading map icons (wait for game initialization)
load_delay = 5

; Require map fragment discovery before showing icons in that area
require_map_fragments = true

; Enable verbose debug logging (memory addresses, param details, FMG internals)
debug_logging = false

[Equipment]

; Weapons, shields, bows, staves, etc.
show_armaments = true

; Armor pieces (helms, chest, gauntlets, legs)
show_armour = true

; Ashes of War (weapon skills)
show_ashes_of_war = true

; Spirit Ashes (summons)
show_spirits = true

; Talismans
show_talismans = true

[Key Items]

; Celestial Dew locations
show_celestial_dew = true

; Cookbooks (crafting recipes)
show_cookbooks = true

; Crystal Tears (for Flask of Wondrous Physick)
show_crystal_tears = true

; Imbued Sword Keys (Four Belfries)
show_imbued_sword_keys = true

; Larval Tears (respec items)
show_larval_tears = true

; Lost Ashes of War
show_lost_ashes = true

; Cracked Pots, Ritual Pots, Perfume Bottles
show_pots_n_perfumes = true

; Golden Seeds, Sacred Tears, Scadutree Fragments, Revered Spirit Ashes
show_seeds_tears = true

; Whetblades (weapon infusion types)
show_whetblades = true

[Loot]

; Arrows, bolts, greatarrows, greatbolts
show_ammo = true

; Bell Bearings (unlock shop items)
show_bell_bearings = true

; Consumable items (runes, buffs, throwables)
show_consumables = true

; Crafting materials (flowers, bones, etc.)
show_crafting_materials = true

; Multiplayer items (Furlcalling Fingers, messages), Gestures, Pates
show_mp_fingers = true

; Material gathering nodes (DOES NOT DISAPPEAR)
show_material_nodes = true

; Reusable key items (Mimic Veil, Margit's Shackle, etc.)
show_reusables = true

; Somber Scarab locations (respawning somber smithing stones)
show_somber_scarab = true

; Stonesword Keys
show_stonesword_keys = true

; Unique enemy drops (guaranteed drops from specific enemies)
show_unique_drops = true

[Magic]

; Incantation locations
show_incantations = true

; Memory Stone locations (extra spell slots)
show_memory_stones = true

; Sorcery locations
show_sorceries = true

[Quest]

; Deathroot locations (for Gurranq)
show_deathroot = true

; Quest progression items and NPCs
show_progression = true

; Seedbed Curse locations (for Dung Eater quest)
show_seedbed_curses = true

[Reforged]

; ERR camp loot contents
show_camp_contents = true

; ERR Ember Piece locations
show_ember_pieces = true

; ERR-specific item changes and additions
show_items_and_changes = true

; ERR Rune Piece locations
show_rune_pieces = true

[World]

; Sites of Grace
show_graces = true

; Hostile NPC invader locations
show_hostile_npc = true

; Imp Statue (Stonesword Key fog gate) locations
show_imp_statues = true

; Painting locations
show_paintings = true

; Spirit Spring (horse jump) locations
show_spirit_springs = true

; Spiritspring Hawk locations (DLC air currents)
show_spiritspring_hawks = true

; Summoning Pool (Martyr Effigy) locations
show_summoning_pools = true

[Bosses]

; Show overworld boss markers
show_overworld_boss_icons = true

; Show dungeon boss markers
show_dungeon_boss_icons = true

; Change boss icons to red (Aaron mode)
