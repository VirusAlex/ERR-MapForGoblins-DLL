[Bosses]
;
; This section patches ERR's OWN pre-placed map markers (camps, merchants,
; bosses) — NOT the ones injected by this mod. ERR ships these markers in
; WorldMapPointParam but without proper map-fragment discovery logic, so
; without our patching they may stay visible regardless of map discovery
; state or fail to hide after completion.
;
; Our mod's own boss markers (216 from boss_list.json) are controlled by
; [World] show_bosses. These toggles here are independent.

; Patch ERR-placed overworld boss markers (textId2=5100) so they respect
; map-fragment discovery and hide-on-kill state. false = leave untouched.
show_overworld_boss_icons = false
; Patch ERR-placed dungeon boss markers (textId3=5100/5300). false = leave untouched.
show_dungeon_boss_icons = false
; Patch ERR-placed enemy camp markers (textId2=5000) for map-discovery logic.
show_camp_icons = false
; Patch ERR-placed merchant markers (textId4=8800) for map-discovery logic.
show_merchant_icons = false
; When patching ERR bosses, change iconId to 372 (red) and auto-hide on kill.
; Only applies if show_overworld_boss_icons or show_dungeon_boss_icons is true.
redify_boss_icons = false

[Debug]
;
; Hotkey-triggered dump of in-memory map markers (beacons + stamps).
; When enabled, pressing marker_dump_key writes decoded markers to
; logs/MapForGoblins_markers.log alongside the main log.

; Master switch
enable_marker_dump = false
; Key to trigger dump. Supports F1-F24, A-Z, 0-9, Space, Escape, Tab,
; Enter, Backspace, Home, End, PageUp, PageDown, Insert, Delete,
; Up, Down, Left, Right. Default: F9.
marker_dump_key = F9
